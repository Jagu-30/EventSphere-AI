version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eventsphere-postgres
    environment:
      POSTGRES_DB: eventsphere
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eventsphere-net

  redis:
    image: redis:7-alpine
    container_name: eventsphere-redis
    ports:
      - "6379:6379"
    networks:
      - eventsphere-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: eventsphere-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - eventsphere-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventsphere-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@postgres:5432/eventsphere
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - JWT_SECRET=supersecretjwtkeyforprodandsandboxenvironments123!
      - ENVIRONMENT=development
    depends_on:
      - postgres
      - redis
      - elasticsearch
    networks:
      - eventsphere-net

  ai-service:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    container_name: eventsphere-ai-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@postgres:5432/eventsphere
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - eventsphere-net

  realtime-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    container_name: eventsphere-realtime-service
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PORT=3001
    depends_on:
      - redis
    networks:
      - eventsphere-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventsphere-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=http://realtime-service:3001
    depends_on:
      - backend
      - realtime-service
    networks:
      - eventsphere-net

volumes:
  postgres_data:
  elasticsearch_data:

networks:
  eventsphere-net:
    driver: bridge
